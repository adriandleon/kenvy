name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validation:
    name: Validation (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run validation
        run: ./gradlew :kenvy-plugin:test :kenvy-plugin:validatePlugins

  functional-linux:
    name: Functional tests (Ubuntu)
    needs: [validation]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Linux-safe functional tests
        run: >
          ./gradlew :kenvy-plugin:functionalTest
          --tests '*KenvyActionableErrorFunctionalTest'
          --tests '*KenvyAndroidBridgeFunctionalTest'
          --tests '*KenvyCodegenFunctionalTest'
          --tests '*KenvyExampleFunctionalTest'
          --tests '*KenvyGitIgnoreFunctionalTest'
          --tests '*KenvyGradleIsolationFunctionalTest'
          --tests '*KenvyLocalPropertiesFunctionalTest'
          --tests '*KenvyMergeFunctionalTest'
          --tests '*KenvyMetadataFunctionalTest'
          --tests '*KenvyParserFunctionalTest'
          --tests '*KenvyPerformanceFunctionalTest'
          --tests '*KenvyResolutionFunctionalTest'
          --tests '*KenvySensitiveFunctionalTest'

  functional-macos:
    name: iOS functional tests (macOS)
    needs: [validation]
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run iOS functional tests
        run: ./gradlew :kenvy-plugin:functionalTest --tests '*KenvyIosBridgeFunctionalTest'

  compatibility-android-baseline:
    name: Compatibility Android baseline (Ubuntu)
    needs: [validation]
    runs-on: ubuntu-latest
    env:
      KOTLIN_VERSION: "2.1.20"
      AGP_VERSION: "8.5.2"
      JAVA_VERSION: "17"
      JAVA_TOOLCHAIN_VERSION: "17"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android baseline compatibility
        run: ./scripts/compatibility-matrix.sh android-baseline

  compatibility-android-modern:
    name: Compatibility Android modern (Ubuntu)
    needs: [validation]
    runs-on: ubuntu-latest
    env:
      KOTLIN_VERSION: "2.3.20"
      AGP_VERSION: "9.2.0"
      JAVA_VERSION: "17"
      JAVA_TOOLCHAIN_VERSION: "17"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android modern compatibility
        run: ./scripts/compatibility-matrix.sh android-modern

  compatibility-ios-modern:
    name: Compatibility iOS modern (macOS)
    needs: [validation]
    runs-on: macos-latest
    env:
      KOTLIN_VERSION: "2.3.20"
      JAVA_VERSION: "17"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run iOS modern compatibility
        run: ./scripts/compatibility-matrix.sh ios-modern

  compatibility-jvm-modern:
    name: Compatibility JVM toolchain modern (Ubuntu)
    needs: [validation]
    runs-on: ubuntu-latest
    env:
      KOTLIN_VERSION: "2.3.20"
      JAVA_VERSION: "21"
      JAVA_TOOLCHAIN_VERSION: "21"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM modern toolchain compatibility
        run: ./scripts/compatibility-matrix.sh jvm-modern

  public-consumer-smoke:
    name: Public consumer smoke (Ubuntu)
    needs: [validation]
    runs-on: ubuntu-latest
    env:
      KENVY_PUBLIC_VERSION: "0.1.2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run public consumer smoke
        run: ./scripts/public-consumer-smoke.sh
